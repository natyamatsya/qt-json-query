# Continuous Integration for qt-json-query
name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Lint: formatting and static analysis
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install pre-commit

      - name: Run pre-commit (formatting checks only)
        run: pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: clang-format,cmake-format

  # ---------------------------------------------------------------------------
  # Build and test
  # ---------------------------------------------------------------------------
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [default]
        include:
          - os: windows-latest
            compiler: default
            qt_arch: win64_msvc2022_64
          - os: macos-latest
            compiler: default
            qt_arch: ""
          # Linux needs the icu archive: the Qt binaries link against the
          # bundled ICU 73, which is not part of the qtbase archive.
          - os: ubuntu-latest
            compiler: default
            qt_arch: linux_gcc_64
            qt_archives: "icu qtbase"
          # Second compiler leg: LLVM clang + libstdc++ on Linux
          - os: ubuntu-latest
            compiler: clang
            qt_arch: linux_gcc_64
            qt_archives: "icu qtbase"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      # Ninja is preinstalled on all GitHub-hosted images (ubuntu, macOS,
      # Windows); no setup action needed.
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          cache: true
          archives: ${{ matrix.qt_archives || 'qtbase' }}
          arch: ${{ matrix.qt_arch || '' }}

      - name: Set up MSVC dev cmd (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Select clang (clang leg only)
        if: matrix.compiler == 'clang'
        shell: bash
        # The image's default clang 18 defines __cpp_concepts=201907L, which
        # hides libstdc++'s C++23 <expected>; clang >= 19 is required.
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          echo "CC=clang-20" >> "$GITHUB_ENV"
          echo "CXX=clang++-20" >> "$GITHUB_ENV"

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTING=ON \
                -DJSON_QUERY_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        working-directory: build
        run: ctest --output-on-failure --output-junit tests-${{ matrix.os }}-${{ matrix.compiler }}.xml

      # --- Benchmarks ---
      - name: Build benchmarks
        continue-on-error: true
        run: cmake --build build --target json_benchmark --parallel

      - name: Run benchmarks
        if: runner.os != 'Windows'
        continue-on-error: true
        shell: bash
        run: |
          if [ -f "./build/benchmarks/json_benchmark" ]; then
            ./build/benchmarks/json_benchmark --benchmark_format=json --benchmark_out=benchmarks-${{ matrix.os }}.json
          fi

      - name: Run benchmarks (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        run: |
          if (Test-Path ".\build\benchmarks\json_benchmark.exe") {
            .\build\benchmarks\json_benchmark.exe --benchmark_format=json --benchmark_out=benchmarks-${{ matrix.os }}.json
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.compiler }}
          path: build/tests-*.xml

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ matrix.os }}-${{ matrix.compiler }}
          path: benchmarks-${{ matrix.os }}.json

  # ---------------------------------------------------------------------------
  # Sanitizers: ASan + UBSan (Debug, Linux)
  # ---------------------------------------------------------------------------
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      # Ninja is preinstalled on all GitHub-hosted images (ubuntu, macOS,
      # Windows); no setup action needed.
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          cache: true
          archives: "icu qtbase"
          arch: linux_gcc_64

      - name: Configure CMake (ASan + UBSan)
        run: |
          cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -DBUILD_TESTING=ON \
                -DJSON_QUERY_BUILD_BENCHMARKS=OFF \
                -DJSON_QUERY_BUILD_EXAMPLES=OFF \
                -DJSON_QUERY_BUILD_PERF=OFF \
                -DJSON_QUERY_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests under ASan + UBSan
        working-directory: build
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --output-on-failure

  # ---------------------------------------------------------------------------
  # Install + find_package consumer smoke test
  # ---------------------------------------------------------------------------
  install-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # install(SBOM) is a CMake 4.3 experimental feature (the opt-in UUID in
      # CMakeLists.txt is specific to the 4.3 series); the image ships an
      # older CMake, so install 4.3 for this job.
      - name: Install CMake 4.3 (for experimental install(SBOM))
        run: |
          curl -fsSL https://github.com/Kitware/CMake/releases/download/v4.3.4/cmake-4.3.4-linux-x86_64.tar.gz \
            | sudo tar -xz --strip-components=1 -C /usr/local
          cmake --version

      # Ninja is preinstalled on all GitHub-hosted images (ubuntu, macOS,
      # Windows); no setup action needed.
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          cache: true
          archives: "icu qtbase"
          arch: linux_gcc_64

      - name: Configure, build, install
        run: |
          cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTING=OFF \
                -DJSON_QUERY_BUILD_BENCHMARKS=OFF \
                -DJSON_QUERY_BUILD_EXAMPLES=OFF \
                -DJSON_QUERY_BUILD_PERF=OFF \
                -DJSON_QUERY_ENABLE_INSTALL=ON \
                -DJSON_QUERY_ENABLE_SBOM=ON
          cmake --build build --parallel
          cmake --install build --prefix "$GITHUB_WORKSPACE/prefix"

      - name: Verify SBOM was installed
        run: |
          sbom=$(find "$GITHUB_WORKSPACE/prefix" -type f -iname '*.spdx*' | head -n1)
          if [ -z "$sbom" ]; then
            echo "::error::no SPDX SBOM found in the install prefix"
            find "$GITHUB_WORKSPACE/prefix" -type f | sort
            exit 1
          fi
          echo "SBOM: $sbom"
          python3 -m json.tool "$sbom" > /dev/null && echo "SBOM is valid JSON"

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: prefix/**/*.spdx*

      - name: Build and run find_package consumer
        run: |
          cmake -S tests/consumer-smoke -B consumer-build -G Ninja \
                -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/prefix"
          cmake --build consumer-build
          ./consumer-build/consumer_smoke

  # ---------------------------------------------------------------------------
  # Fuzzing (on demand via workflow_dispatch; short LibFuzzer runs per target)
  # ---------------------------------------------------------------------------
  fuzz:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # Ninja is preinstalled on all GitHub-hosted images (ubuntu, macOS,
      # Windows); no setup action needed.
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          cache: true
          archives: "icu qtbase"
          arch: linux_gcc_64

      - name: Install clang 20
        # Same reason as the build-and-test clang leg: the default clang 18
        # cannot use libstdc++'s C++23 <expected>.
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20

      - name: Configure (clang + LibFuzzer)
        env:
          CC: clang-20
          CXX: clang++-20
        run: |
          cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -DBUILD_TESTING=ON \
                -DJSON_QUERY_BUILD_BENCHMARKS=OFF \
                -DJSON_QUERY_BUILD_EXAMPLES=OFF \
                -DJSON_QUERY_BUILD_PERF=OFF \
                -DJSON_QUERY_ENABLE_FUZZ_TESTS=ON

      - name: Build fuzz targets
        run: cmake --build build --parallel --target fuzz_jsonpath_parsing fuzz_jsonpointer_parsing fuzz_combined_evaluation fuzz_jsonschema

      - name: Run fuzzers (120s each)
        working-directory: build/fuzz
        run: |
          status=0
          for f in fuzz_jsonpath_parsing fuzz_jsonpointer_parsing fuzz_combined_evaluation fuzz_jsonschema; do
            echo "=== $f"
            ./"$f" "corpus/$f" -max_total_time=120 -rss_limit_mb=2048 -print_final_stats=1 || status=1
          done
          if find . -maxdepth 1 -name 'crash-*' | grep -q .; then
            echo "::error::fuzzing produced crash artifacts"
            status=1
          fi
          exit $status

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes
          path: build/fuzz/crash-*
