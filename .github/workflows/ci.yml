# Continuous Integration for qt-json-query
name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Lint: formatting and static analysis
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pre-commit

      - name: Run pre-commit (formatting checks only)
        run: pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: clang-format,cmake-format

  # ---------------------------------------------------------------------------
  # Build and test
  # ---------------------------------------------------------------------------
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: windows-latest
            qt_arch: win64_msvc2022_64
          - os: macos-latest
            qt_arch: ""
          - os: ubuntu-latest
            qt_arch: linux_gcc_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          cache: true
          archives: "qtbase"
          arch: ${{ matrix.qt_arch || '' }}

      - name: Set up MSVC dev cmd (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTING=ON \
                -DBUILD_BENCHMARKING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        working-directory: build
        run: ctest --output-on-failure --output-junit tests-${{ matrix.os }}.xml

      # --- Benchmarks ---
      - name: Build benchmarks
        continue-on-error: true
        run: cmake --build build --target json_benchmark --parallel

      - name: Run benchmarks
        if: runner.os != 'Windows'
        continue-on-error: true
        shell: bash
        run: |
          if [ -f "./build/json_benchmark" ]; then
            ./build/json_benchmark --benchmark_format=json --benchmark_out=benchmarks-${{ matrix.os }}.json
          fi

      - name: Run benchmarks (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        run: |
          if (Test-Path ".\build\json_benchmark.exe") {
            .\build\json_benchmark.exe --benchmark_format=json --benchmark_out=benchmarks-${{ matrix.os }}.json
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: build/tests-*.xml

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.os }}
          path: benchmarks-${{ matrix.os }}.json

  # ---------------------------------------------------------------------------
  # Sanitizers: ASan + UBSan (Debug, Linux)
  # ---------------------------------------------------------------------------
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          cache: true
          archives: "qtbase"
          arch: linux_gcc_64

      - name: Configure CMake (ASan + UBSan)
        run: |
          cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -DBUILD_TESTING=ON \
                -DBUILD_BENCHMARKING=OFF \
                -DJSON_QUERY_BUILD_EXAMPLES=OFF \
                -DJSON_QUERY_BUILD_PERF=OFF \
                -DJSON_QUERY_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests under ASan + UBSan
        working-directory: build
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --output-on-failure
