# Continuous Integration for qt-json-query (Qt 6 + GoogleTest + Google Benchmark)
name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: 6.8.3
          cache: true
          archives: "qtbase"
          arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2022_64' || 'clang_64' }}

      - name: Set up MSVC dev cmd (Windows only)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake (Release)
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTING=ON \
                -DBUILD_BENCHMARKING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        working-directory: build
        continue-on-error: true
        run: ctest --output-on-failure --output-junit tests-${{ matrix.os }}.xml

      # --- Benchmarks ---
      - name: Build benchmarks
        continue-on-error: true
        run: cmake --build build --target json_benchmark --parallel

      - name: Run benchmarks (Windows)
        if: matrix.os == 'windows-latest'
        continue-on-error: true
        run: |
          if (Test-Path ".\\build\\json_benchmark.exe") {
            .\\build\\json_benchmark.exe --benchmark_format=json --benchmark_out=benchmarks-${{ matrix.os }}.json
          } else {
            Write-Host "Benchmark executable not found, skipping benchmarks"
          }

      - name: Run benchmarks (macOS)
        if: matrix.os == 'macos-latest'
        continue-on-error: true
        run: |
          if [ -f "./build/json_benchmark" ]; then
            ./build/json_benchmark --benchmark_format=json --benchmark_out=benchmarks-${{ matrix.os }}.json
          else
            echo "Benchmark executable not found, skipping benchmarks"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: build/tests-*.xml

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.os }}
          path: benchmarks-${{ matrix.os }}.json
